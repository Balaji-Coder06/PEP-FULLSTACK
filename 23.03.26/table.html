<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Table</title>
    <link rel="stylesheet" href="tablestyle.css">
</head>
<body>
    <h1>PEP Table</h1>

        <tr>
            <th rowspan="3">Day</th>
            <th colspan="3">PEP WORKSHOP &#128525;</th>
        </tr>
        <tr>
            <th colspan="2">Schedule</th>
            <th rowspan="2">Topic</th>
        </tr>
        <tr>
            <th>Begin</th>
            <th>End</th>
        </tr>
        <tr>
            <th rowspan="2">Friday</th>
            <td>9:00am</td>
            <td>1:00pm</td>
            <td>HTML &#128515;</td>
        </tr>
        <tr>
            <td>2:00pm</td>
            <td>5:30pm</td>
            <td>CSS &#128515;</td>
        </tr>
        <tr>
            <th rowspan="2">Saturday</th>
            <td>9:00am</td>
            <td>1:00pm</td>
            <td rowspan="2">JS and React Basics &#128515;</td>
        </tr>
        <tr>
            <td>2:00pm</td>
            <td>5:30pm</td>
        </tr>
        <tr>
            <th>Sunday</th>
            <td>9:00am</td>
            <td>5:30pm</td>
            <td>Let's Build Foodie &#128514;</td>
        </tr>
    </table>
</body>
</html>
