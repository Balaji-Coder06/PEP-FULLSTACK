<body>
    <h1>Time</h1>
    <p id="clock"></p>
    <h1>Count-Down</h1>
    <input type="number" id="inputTime" placeholder="Enter seconds"><br>
    <button onclick="startCountdown()">Start</button><br>
    <p id="countdown"></p>
    <script>
        function clockff() {
            let obj = new Date();
            document.getElementById("clock").innerHTML = obj.toLocaleTimeString();
        }
        setInterval(clockff, 500);

        function startCountdown() {
            let t = document.getElementById("inputTime").value;
            let x = setInterval(function () {
                if (t <= 0) {
                    clearInterval(x);
                    document.getElementById("countdown").innerHTML = "Time's up!";
                } else {
                    document.getElementById("countdown").innerHTML = t;
                    t--;
                }
            }, 1000);
        }
