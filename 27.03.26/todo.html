<!DOCTYPE html>
<html>

<head>
    <title>Simple Todo</title>
    <style>
        body {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            text-align: center;
        }

        input {
            padding: 8px;
            width: 200px;
            border-radius: 20px;
            margin-right: 15px;
        }

        button {
            padding: 8px;
            border-radius: 10px;
            cursor: pointer;
        }

        #btn{
            
            background-color: white;
            font-size: 20px;
        }

        li {
            list-style: none;
            font-size: 30px;
            margin: 10px;
        }

        .done {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>

<body>

    <h1 style="font-size: 40px;">Todo App</h1>

    <input type="text" id="task" placeholder="Enter task" >
    <button onclick="addTask()">Add</button>

    <ul id="list"></ul>

    <script>
        function addTask() {
            let t = document.getElementById("task").value;

            if (t === "") return;

            let li = document.createElement("li");

            li.innerHTML = t +
                " <button onclick='mark(this)' id='btn'>&#9989;</button>" +
                " <button onclick='removeTask(this)' id='btn'>&#10060;</button>";

            document.getElementById("list").appendChild(li);

            document.getElementById("task").value = "";
        }

        function mark(b) {
            let li = b.parentElement;
            li.classList.toggle("done");
        }
        function removeTask(b) {
            let li = b.parentElement;
            li.remove();
        }
    </script>
</body>

</html>
