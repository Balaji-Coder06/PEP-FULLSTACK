<html>
<head>
    <script>
        function load() {
            var d1 = document.getElementById("div1");
            d1.addEventListener("click", function () { alert("parent1 event") }, true);



            var d2 = document.getElementById("div2");
            d2.addEventListener("click", function () { alert("parent2 event") }, false);

            //stopPropagation();

            var d3 = document.getElementById("div3");
            d3.addEventListener("click", function () { alert("child event") }, true);
        }
    </script>
</head>
<body onload="load()">
    <div id="div1">
        <div id="div2">
            <div id="div3">
                click me
            </div>
        </div>
    </div>
</body>
</html>
