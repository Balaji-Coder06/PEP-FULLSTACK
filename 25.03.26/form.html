<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="form.css">
</head>

<body>
    <h1>Registration - Form</h1>
    <form name="myForm" onsubmit="return validateForm()">
        <label>Name:
            <input type="text" id="name">
        </label>
        <label>Reg No:
            <input type="text" id="regno" required>
        </label>
        <label>Email:
            <input id="email">
        </label>
        <label>Password:
            <input type="password" id="password">
        </label>
        <label>Phone Number:
            <input type="tel" id="phone">
        </label>
        <label>Gender:
            <select>
                <option>Male</option>
                <option>Female</option>
                <option>Others</option>
            </select>
        </label>
        <label>Date of Birth:
            <input type="date" required>
        </label>
        <label>Address:
            <textarea rows="4" cols="30" required></textarea>
        </label>
        <label>Qualification:
            <select>
                <option>B.E</option>
                <option>B.Tech</option>
                <option>B.Sc</option>
                <option>M.E</option>
            </select>
        </label>
        <label>Skills:
            <select>
                <option>HTML</option>
                <option>CSS</option>
                <option>JavaScript</option>
            </select>
            <div style="display: flex; gap: 10px;">
                <input class="submit" type="submit" value="Submit">
                <input class="reset" type="reset" value="Reset">
            </div>
    </form>
    <script>
        function validateForm() {
            let x = document.getElementById("name").value;
            if (x == "") {
                alert("Name must be filled out");
                return false;
            }

            let y = document.getElementById("email").value;
            var re2=new RegExp("^[a-zA-Z0-9]+@[a-zA-Z]+\.[a-zA-Z]{2,4}$");
            if (!re2.test(y)) {
                alert("Invalid Email");
                return false;
            }

            let z = document.getElementById("phone").value;
            if (z.length != 10 || isNaN(z)) {
                alert("Phone number must be 10 digits");
                return false;
            }

            let a = document.getElementById("password").value;
            let upper = false, lower = false, number = false, special = false;
            for (let i = 0; i < a.length; i++) {
                let c = a[i];
                if (c >= 'A' && c <= 'Z') upper = true;
                else if (c >= 'a' && c <= 'z') lower = true;
                else if (c >= '0' && c <= '9') number = true;
                else if ("@#$%^&*".includes(c)) special = true;
            }
            if (a.length < 8) {
                alert("Password must be at least 8 characters long");
                return false;
            }
            if (!upper) {
                alert("Password must include at least one uppercase letter");
                return false;
            }
            if (!lower) {
                alert("Password must include at least one lowercase letter");
                return false;
            }
            if (!number) {
                alert("Password must include at least one number");
                return false;
            }
            if (!special) {
                alert("Password must include at least one special character (@#$%^&*)");
                return false;
            }
            // if(passone.)
        }
    </script>
</body>

</html>
