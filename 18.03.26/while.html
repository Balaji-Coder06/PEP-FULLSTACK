<!DOCTYPE html>

<head>
    <title>Document</title>
</head>

<body>
    <button style="height: 50px; 
                  width: 200px; 
                  display: block; 
                  margin: 200px auto; 
                  font-size: 30px; 
                  font-family: 'Times New Roman'; 
                  color: red; 
                  background-color: aqua; 
                  font-weight: bold;" 
                  type="button" 
                  value="Click me" 
                  onclick="display()">
    <script>
        function display() {
            var i = 1
            while (i <= 10) {
                document.write("the number is : " + i + "<br>")
                i++
            }
        }
    </script>
</body>

</html>
