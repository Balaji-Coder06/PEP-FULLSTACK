<!DOCTYPE html>

<head>
    <title>Document</title>
</head>

<body>
    <input style="height: 50px; 
                  width: 200px; 
                  display: block; 
                  margin: 200px auto; 
                  font-size: 30px; 
                  font-family: 'Times New Roman'; 
                  color: red; 
                  background-color: aqua; 
                  font-weight: bold;" 
                  type="button" 
                  value="Click me" 
                  onclick="display()">
    <script>
        function display() {
            var x=prompt("Enter the no of table u want: ")
            for(var i=1;i<=10;i++){
                document.write(x+"x"+i+"="+(x*i)+"<br>");
            }
        }
    </script>
</body>

</html>
